<!DOCTYPE html>
<html lang="hi" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The QNA - Home</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0F19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0B0F19;
            --card-bg: #131B2C;
            --accent: #3B82F6;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            background-color: var(--bg-dark);
            color: #F8FAFC;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .pro-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .glass-nav {
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
        }

        .pro-fab {
            background: linear-gradient(135deg, #2563EB, #06B6D4);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.5);
            transition: transform 0.2s ease;
        }

        .pro-fab:active {
            transform: scale(0.92);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
</head>

<body class="h-full flex flex-col overflow-hidden">

    <!-- === 1. टॉप हेडर (Clean App Header) === -->
    <header class="w-full fixed top-0 z-50 bg-[#0B0F19]/90 backdrop-blur-md border-b border-white/5">
        <div class="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-sm">
                    Q
                </div>
                <h1 class="text-xl font-black text-white tracking-wide">The <span class="text-blue-500">QNA</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 active:scale-95 transition">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </button>
                <button
                    class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 relative active:scale-95 transition">
                    <i class="fa-regular fa-bell text-sm"></i>
                    <span class="absolute top-2 right-2 w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- === 2. मुख्य होमपेज कंटेंट === -->
    <main class="flex-1 overflow-y-auto w-full max-w-md mx-auto pt-24 pb-28 px-5 space-y-7 scroll-smooth no-scrollbar">

        <!-- हीरो बैनर -->
        <div
            class="w-full bg-gradient-to-r from-blue-700 to-indigo-600 rounded-[24px] py-3 px-4 relative overflow-hidden shadow-lg">

            <i class="fa-solid fa-bolt text-6xl text-white/10 absolute -right-2 -bottom-2 rotate-12"></i>

            <div class="relative z-10 w-2/3">
                <span
                    class="bg-white/20 text-white text-[9px] font-bold px-2 py-1 rounded-md uppercase tracking-wider backdrop-blur-sm">
                    Premium Pass
                </span>

                <h2 class="text-lg font-black text-white mt-2 leading-snug">
                    सभी 1000+ मॉक टेस्ट करें अनलॉक
                </h2>

                <p class="text-[11px] text-blue-100 mt-1">
                    प्रथम माह मात्र ₹1 में
                </p>

                <a href="./upi.html">
                    <button
                        class="mt-3 bg-white text-blue-700 text-xs font-bold py-2 px-4 rounded-xl shadow-md active:scale-95 transition">
                        Get Pass Now
                    </button>
                </a>
            </div>
        </div>

        <!-- कैटेगरीज ग्रिड -->
        <div>
            <div class="flex justify-between items-center mb-3.5">
                <h3 class="text-sm font-bold text-white tracking-wide">Select Subject</h3>
                <a href="./GK_catogery.html" class="text-[10px] text-blue-400 font-bold uppercase hover:underline">View
                    All</a>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <a href="#" class="flex flex-col items-center gap-2">
                    <div
                        class="w-14 h-14 pro-card flex items-center justify-center text-amber-500 text-xl active:scale-95 transition">
                        <i class="fa-solid fa-landmark"></i>
                    </div>
                    <span class="text-[10px] text-gray-300 font-semibold text-center">इतिहास</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-2">
                    <div
                        class="w-14 h-14 pro-card flex items-center justify-center text-emerald-500 text-xl active:scale-95 transition">
                        <i class="fa-solid fa-earth-asia"></i>
                    </div>
                    <span class="text-[10px] text-gray-300 font-semibold text-center">भूगोल</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-2">
                    <div
                        class="w-14 h-14 pro-card flex items-center justify-center text-cyan-400 text-xl active:scale-95 transition">
                        <i class="fa-solid fa-scale-balanced"></i>
                    </div>
                    <span class="text-[10px] text-gray-300 font-semibold text-center">संविधान</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-2">
                    <div
                        class="w-14 h-14 pro-card flex items-center justify-center text-purple-400 text-xl active:scale-95 transition">
                        <i class="fa-solid fa-flask"></i>
                    </div>
                    <span class="text-[10px] text-gray-300 font-semibold text-center">विज्ञान</span>
                </a>
            </div>
        </div>

        <!-- ट्रेंडिंग टेस्ट सीरीज़ -->
        <div>
            <h3 class="text-sm font-bold text-white tracking-wide mb-3.5">Trending Test Series</h3>
            <div class="space-y-3">
                <div class="pro-card p-3.5 flex items-center gap-4 active:bg-white/5 transition">
                    <div
                        class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500 text-lg shrink-0">
                        <i class="fa-solid fa-file-lines"></i>
                    </div>
                    <div class="flex-1">
                        <a href="./index.html">
                            <div class="flex justify-between items-start">
                                <h4 class="text-xs font-bold text-white mb-1">डेली करेंट अफेयर्स 2026</h4>
                                <span
                                    class="bg-green-500/20 text-green-400 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase">Live</span>
                            </div>
                        </a>
                        <p class="text-[10px] text-gray-500 font-medium">50 Questions • 45 Mins</p>
                    </div>
                </div>

                <div class="pro-card p-3.5 flex items-center gap-4 active:bg-white/5 transition">
                    <div
                        class="w-12 h-12 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-500 text-lg shrink-0">
                        <i class="fa-solid fa-monument"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="text-xs font-bold text-white mb-1">आधुनिक भारत का उदय</h4>
                            <i class="fa-solid fa-lock text-gray-600 text-[10px]"></i>
                        </div>
                        <p class="text-[10px] text-gray-500 font-medium">100 Questions • 90 Mins</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- === 3. बॉटम नेविगेशन बार (With Premium Icons) === -->
    <nav class="fixed bottom-0 w-full glass-nav z-[100] pb-safe pt-2">
        <div class="max-w-md mx-auto flex justify-between items-center px-6 pb-2 relative">

            <!-- 1. Home (Active) -->
            <a href="#" class="flex flex-col items-center gap-1 w-12 text-blue-500">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Home</span>
                <div class="w-1 h-1 bg-blue-500 rounded-full mt-0.5 shadow-[0_0_8px_#3B82F6]"></div>
            </a>

            <!-- 2. Feed -->
            <a href="#"
                class="flex flex-col items-center gap-1 w-12 text-gray-500 hover:text-gray-300 transition mt-1.5">
                <i class="fa-solid fa-bolt text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-wider">Feed</span>
            </a>

            <!-- 3. सेंटर फ्लोटिंग + -->
            <div class="relative w-16 flex justify-center">
                <button
                    class="absolute -bottom-6 w-14 h-14 pro-fab rounded-[20px] flex items-center justify-center text-white text-xl z-50">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <!-- 4. Topics -->
            <a href="#"
                class="flex flex-col items-center gap-1 w-12 text-gray-500 hover:text-gray-300 transition mt-1.5">
                <i class="fa-solid fa-layer-group text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-wider">Topics</span>
            </a>

            <!-- 5. Me (Profile) -->
            <a href="./profile.html"
                class="flex flex-col items-center gap-1 w-12 text-gray-500 hover:text-gray-300 transition mt-1.5">
                <i class="fa-regular fa-user text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-wider">Me</span>
            </a>

        </div>
    </nav>

</body>

</html>
