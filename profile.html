<!DOCTYPE html>
<html lang="hi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - The QNA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --bg-dark: #0B0F19; 
            --card-bg: #131B2C; 
            --accent: #3B82F6; 
            --border: rgba(255, 255, 255, 0.06);
        }
        body { 
            background-color: var(--bg-dark); 
            color: #F8FAFC; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .pro-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; }
        
        /* कस्टम स्क्रॉलबार छिपाने के लिए */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* प्रीमियम ग्रेडिएंट टेक्स्ट */
        .text-gradient { background: linear-gradient(135deg, #FCD34D, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden">

    <!-- === 1. टॉप हेडर (Settings & Edit Profile) === -->
    <header class="w-full fixed top-0 z-50 bg-[#0B0F19]/90 backdrop-blur-md border-b border-white/5">
        <div class="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white tracking-wide">My Profile</h1>
            <div class="flex items-center gap-3">
                <button class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 active:scale-95 transition">
                    <i class="fa-solid fa-gear text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- === 2. मुख्य प्रोफाइल कंटेंट एरिया === -->
    <main class="flex-1 overflow-y-auto w-full max-w-md mx-auto pt-24 pb-10 px-5 space-y-6 scroll-smooth no-scrollbar">
        
        <!-- 1. यूजर इन्फो कार्ड (अवतार और नाम) -->
        <div class="flex flex-col items-center text-center pt-4">
            <div class="relative mb-3">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 p-[3px] shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                    <!-- डमी प्रोफाइल पिक्चर -->
<img id="profilePhoto" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Vijay" alt="Profile" class="w-full h-full rounded-full bg-[#131B2C]">                </div>
                <!-- प्रीमियम बैज -->
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-900 text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-widest shadow-md flex items-center gap-1 border border-yellow-300/50">
                    <i class="fa-solid fa-crown text-[8px]"></i> Premium
                </div>
            </div>
    <h2 id="profileName" class="text-xl font-black text-white">विजय कुमार</h2>
            <p id="profileEmail" class="text-xs text-gray-400 font-medium mt-1">student@example.com</p>
        <a href="./edit_profile.html">    <button class="mt-3 text-[10px] text-blue-400 font-bold uppercase tracking-wider bg-blue-500/10 px-3 py-1.5 rounded-lg active:scale-95 transition">Edit Profile</button></a>
        </div>

        <!-- 2. परफॉरमेंस स्टेट्स (रैंक और एक्यूरेसी) -->
        <div class="grid grid-cols-3 gap-3">
            <div class="pro-card p-4 flex flex-col items-center text-center active:bg-white/5 transition">
                <i class="fa-solid fa-trophy text-amber-400 text-xl mb-2"></i>
                <span class="text-xl font-extrabold text-white">#142</span>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Global Rank</span>
            </div>
            <div class="pro-card p-4 flex flex-col items-center text-center active:bg-white/5 transition">
                <i class="fa-solid fa-bullseye text-blue-400 text-xl mb-2"></i>
                <span class="text-xl font-extrabold text-white">86%</span>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Accuracy</span>
            </div>
            <div class="pro-card p-4 flex flex-col items-center text-center active:bg-white/5 transition">
                <i class="fa-solid fa-file-signature text-emerald-400 text-xl mb-2"></i>
                <span class="text-xl font-extrabold text-white">24</span>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Tests Done</span>
            </div>
        </div>

        <!-- 3. सब्सक्रिप्शन / पास स्टेटस -->
        <div class="pro-card p-5 relative overflow-hidden">
            <!-- बैकग्राउंड ग्लो -->
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/20 blur-2xl rounded-full"></div>
            
            <div class="flex justify-between items-center relative z-10">
                <div>
                    <h3 class="text-sm font-bold text-white mb-1">QNA Premium Pass</h3>
                    <p class="text-[10px] text-gray-400">वैधता: <span class="text-emerald-400 font-bold">14 Aug 2026</span></p>
                </div>
                <button class="bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-900 text-[10px] font-black px-4 py-2 rounded-xl shadow-md active:scale-95 transition">
                    Renew Pass
                </button>
            </div>
        </div>

        <!-- 4. एकाउंट मेन्यू लिस्ट (ऑप्शंस) -->
        <div class="pro-card overflow-hidden">
            
            <!-- Option 1 -->
            <a href="#" class="flex items-center justify-between p-4 border-b border-white/5 hover:bg-white/5 active:bg-white/10 transition">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </div>
                    <span class="text-sm font-semibold text-gray-200">Test History</span>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] text-gray-500"></i>
            </a>

            <!-- Option 2 -->
            <a href="#" class="flex items-center justify-between p-4 border-b border-white/5 hover:bg-white/5 active:bg-white/10 transition">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-400">
                        <i class="fa-solid fa-bookmark"></i>
                    </div>
                    <span class="text-sm font-semibold text-gray-200">Saved Questions</span>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] text-gray-500"></i>
            </a>

            <!-- Option 3 -->
            <a href="#" class="flex items-center justify-between p-4 border-b border-white/5 hover:bg-white/5 active:bg-white/10 transition">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span class="text-sm font-semibold text-gray-200">My Performance Analysis</span>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] text-gray-500"></i>
            </a>

            <!-- Option 4 -->
<a href="#" id="logoutBtn" class="flex items-center justify-between p-4 hover:bg-white/5 active:bg-white/10 transition">                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center text-red-400">
                        <i class="fa-solid fa-power-off"></i>
                    </div>
                    <span class="text-sm font-semibold text-red-400">Log Out</span>
                </div>
            </a>
            
        </div>

        <!-- वर्ज़न इन्फो -->
        <div class="text-center pb-6">
            <p class="text-[10px] text-gray-600 font-medium">The QNA App Version 1.0.4</p>
        </div>

    </main>
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    location.href = "signup.html";   // Apna login page name likh dena
}

document.getElementById("profileName").textContent = user.name;
document.getElementById("profileEmail").textContent = user.email;
document.getElementById("profilePhoto").src = user.photo;

// Logout
document.getElementById("logoutBtn").addEventListener("click", function (e) {
    e.preventDefault();

    if (confirm("Logout from The QNA?")) {
        localStorage.removeItem("user");
        location.href = "signup.html";   // Apna login page name
    }
});
</script>
</body>
</html>
