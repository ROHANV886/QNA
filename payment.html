
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment History - The QNA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f8fafc;
}
.filter-btn{
    padding:8px 18px;
    border-radius:999px;
    border:2px solid #2563eb;
    color:#2563eb;
    font-weight:700;
    background:#fff;
    cursor:pointer;
    transition:.3s;
}
.filter-btn.active{
    background:#2563eb;
    color:#fff;
}
</style>
</head>

<body>

<!-- Header -->
<header class="fixed top-0 left-0 w-full bg-white shadow z-50 border-b">
<div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<div class="w-9 h-9 bg-blue-600 rounded-lg text-white flex items-center justify-center font-black">
Q
</div>

<h1 class="text-2xl font-black">
The <span class="text-blue-600">QNA</span>
</h1>
</div>

<h2 class="font-bold text-lg">
💳 Payment History
</h2>

</div>
</header>

<div class="pt-24 max-w-6xl mx-auto px-5">

<!-- Summary -->
<div class="grid md:grid-cols-3 gap-4 mb-6">

<div class="bg-white rounded-2xl shadow p-5 border">
<p class="text-gray-500 font-semibold">Total Payments</p>
<h2 class="text-3xl font-black mt-2">8</h2>
</div>

<div class="bg-white rounded-2xl shadow p-5 border">
<p class="text-gray-500 font-semibold">Successful</p>
<h2 class="text-3xl font-black text-green-600 mt-2">₹3,200</h2>
</div>

<div class="bg-white rounded-2xl shadow p-5 border">
<p class="text-gray-500 font-semibold">Pending</p>
<h2 class="text-3xl font-black text-yellow-500 mt-2">2</h2>
</div>

</div>

<!-- Search -->
<input
id="search"
type="text"
placeholder="Search Transaction ID..."
class="w-full border rounded-xl p-3 mb-4 outline-blue-600">

<!-- Filter -->
<div class="flex gap-2 mb-6 flex-wrap">

<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="success">Success</button>
<button class="filter-btn" data-filter="pending">Pending</button>
<button class="filter-btn" data-filter="failed">Failed</button>

</div>

<!-- Payments -->
<div id="payments" class="space-y-4"></div>

<!-- Empty -->
<div id="empty" class="hidden text-center py-20 text-gray-500 font-bold text-xl">
No Payment Found 😔
</div>

</div>

<script>

const payments=[

{
id:"TXN458920",
date:"06 Jul 2026 • 10:45 AM",
amount:499,
method:"UPI",
status:"success"
},

{
id:"TXN458921",
date:"05 Jul 2026 • 8:10 PM",
amount:299,
method:"Card",
status:"pending"
},

{
id:"TXN458922",
date:"04 Jul 2026 • 1:35 PM",
amount:999,
method:"UPI",
status:"failed"
},

{
id:"TXN458923",
date:"03 Jul 2026 • 11:30 AM",
amount:799,
method:"UPI",
status:"success"
}

];

const box=document.getElementById("payments");
const search=document.getElementById("search");
let current="all";

function render(){

box.innerHTML="";

const list=payments.filter(x=>{

const s=x.id.toLowerCase().includes(search.value.toLowerCase());

const f=current==="all"||x.status===current;

return s&&f;

});

document.getElementById("empty").classList.toggle("hidden",list.length);

list.forEach(x=>{

let color="";

if(x.status=="success") color="bg-green-100 text-green-700";

if(x.status=="pending") color="bg-yellow-100 text-yellow-700";

if(x.status=="failed") color="bg-red-100 text-red-700";

box.innerHTML+=`

<div class="bg-white rounded-2xl shadow border p-5">

<div class="flex justify-between items-center mb-3">

<div>

<h3 class="font-black text-lg">${x.id}</h3>

<p class="text-gray-500 text-sm">${x.date}</p>

</div>

<span class="${color} px-3 py-1 rounded-full font-bold capitalize">
${x.status}
</span>

</div>

<div class="flex justify-between">

<div>

<p class="text-gray-500">Method</p>

<p class="font-bold">${x.method}</p>

</div>

<div class="text-right">

<p class="text-gray-500">Amount</p>

<p class="font-black text-blue-600 text-xl">
₹${x.amount}
</p>

</div>

</div>

</div>

`;

});

}

render();

search.oninput=render;

document.querySelectorAll(".filter-btn").forEach(btn=>{

btn.onclick=function(){

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));

this.classList.add("active");

current=this.dataset.filter;

render();

}

});

</script>

</body>
</html>
