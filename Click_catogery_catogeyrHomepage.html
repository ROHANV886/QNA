<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास टेस्ट सीरीज़ - The QNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 p-4">

    <main class="max-w-6xl mx-auto py-10">
        <div class="mb-10">
            <h2 class="text-3xl font-black text-gray-900">🏛️ इतिहास (History) - टेस्ट सीरीज़</h2>
            <p class="text-gray-500 mt-2">1000 से अधिक टेस्ट्स का संग्रह। एक-एक कदम सफलता की ओर।</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- TEST #1000: Unlocked/Latest -->
            <div class="bg-white p-6 rounded-3xl border-2 border-blue-600 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Unlocked</span>
                    <span class="font-bold text-gray-500">टेस्ट #1000</span>
                </div>
                <h4 class="font-black text-xl mb-4">आधुनिक भारत का उदय</h4>
                <div class="bg-gray-50 p-4 rounded-xl mb-6">
                    <p class="font-bold text-sm mb-4">Q1: 1857 की क्रांति का नेतृत्व किसने किया?</p>
                    <div class="grid grid-cols-2 gap-2 text-[11px] font-bold">
                        <div class="p-2 bg-white border rounded">A. बहादुर शाह जफर</div>
                        <div class="p-2 bg-white border rounded">B. रानी लक्ष्मीबाई</div>
                        <div class="p-2 bg-white border rounded">C. कुंवर सिंह</div>
                        <div class="p-2 bg-white border rounded">D. तात्या टोपे</div>
                    </div>
                </div>
                <a href="/test/1000" class="block w-full text-center bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">टेस्ट जारी रखें</a>
            </div>

            <!-- TEST #999 to #986 (14 Locked Tests) -->
            <!-- हम यहाँ 14 लूप वाले कार्ड्स बनाएंगे -->
            <script>
                for (let i = 999; i >= 986; i--) {
                    document.write(`
                        <div class="bg-white p-6 rounded-3xl border border-gray-200 opacity-75 shadow-sm">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-gray-200 text-gray-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">🔒 Locked</span>
                                <span class="font-bold text-gray-500">टेस्ट #${i}</span>
                            </div>
                            <h4 class="font-black text-xl mb-4">इतिहास का महत्वपूर्ण विषय #${i}</h4>
                            <div class="bg-gray-50 p-4 rounded-xl mb-6 text-center py-8">
                                <p class="text-gray-400 font-bold text-sm">टेस्ट अनलॉक करने के लिए पिछला टेस्ट पूरा करें</p>
                            </div>
                            <button disabled class="w-full text-center bg-gray-200 text-gray-500 py-3 rounded-xl font-bold cursor-not-allowed">Locked</button>
                        </div>
                    `);
                }
            </script>

        </div>
    </main>

</body>
</html>
