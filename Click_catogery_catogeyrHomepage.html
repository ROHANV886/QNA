<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The QNA Dynamic Tests</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.scrollbar-hide::-webkit-scrollbar{
    display:none;
}
.scrollbar-hide{
    -ms-overflow-style:none;
    scrollbar-width:none;
}

.filter-btn{
    white-space:nowrap;
    padding:8px 16px;
    border-radius:9999px;
    background:#fff;
    border:2px solid #2563eb;
    color:#2563eb;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.filter-btn.active{
    background:#2563eb;
    color:#fff;
}
</style>
</head>
<body class="bg-gray-50 p-5  pt-24  ">
<header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md border-b border-gray-200">
    <div class="w-full px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-sm">
                Q
            </div>
            <h1 class="text-xl font-black text-black tracking-wide">
                The <span class="text-blue-600">QNA</span>
            </h1>
        </div>

        <div class="flex items-center gap-3">
            <p class="text-xl text-black mb-0">
                🏛️ History Test Series
            </p>
        </div>
    </div>
</header>
  <!-- Filter -->
   <!-- Filter Button -->
<div class="px-5 py-3">
  <a href="./PWa4_filterPage of catogery list .html">  <button class="filter-btn">
        🔍 Filter
    </button></a>
</div>
<div class="flex gap-2 overflow-x-auto pb-3 mb-6 scrollbar-hide" id="filterBar">
</div>
<div class="max-w-6xl mx-auto">

<div id="tests" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<script>
const sampleOptions=[
"A. बहादुर शाह जफर",
"B. रानी लक्ष्मीबाई",
"C. कुंवर सिंह",
"D. तात्या टोपे"
];

const data=[];
for(let i=1000;i>=986;i--){
 data.push({
   id:i,
   title:`इतिहास का महत्वपूर्ण विषय #${i}`,
   question:"1857 की क्रांति का नेतृत्व किसने किया?",
   options:[...sampleOptions]
 });
}

const box=document.getElementById("tests");

data.forEach(test=>{
const card=document.createElement("div");
card.className="bg-white rounded-3xl p-6 shadow border-2 border-blue-600";

card.innerHTML=`
<div class="flex justify-between items-center mb-4">
<span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">Unlocked</span>
<span class="font-bold text-gray-500">टेस्ट #${test.id}</span>
</div>

<h3 class="font-black text-xl mb-4">${test.title}</h3>

<div class="bg-gray-50 rounded-xl p-4">
<p class="font-bold mb-4">Q1: ${test.question}</p>

<div class="grid grid-cols-2 gap-2 options"></div>
</div>

<a href="upi.html"
class="block mt-5 text-center bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3 font-bold">
टेस्ट जारी रखें
</a>
`;

const optBox=card.querySelector(".options");

test.options.forEach(op=>{
const div=document.createElement("div");
div.className="p-2 border rounded cursor-pointer bg-white hover:bg-gray-100 font-bold text-xs";
div.textContent=op;

div.onclick=function(){
optBox.querySelectorAll("div").forEach(x=>{
x.className="p-2 border rounded cursor-pointer bg-white hover:bg-gray-100 font-bold text-xs";
});
this.className="p-2 border-2 border-blue-600 bg-blue-50 text-blue-600 rounded cursor-pointer font-bold text-xs";
};

optBox.appendChild(div);
});

box.appendChild(card);
});
</script>
</body>
</html>
