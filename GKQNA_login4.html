<!DOCTYPE html>
<html lang="hi" class="scroll-smooth h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The QNA - लॉगिन / रजिस्ट्रेशन</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --blue: #00d4ff; --dark: #020617; 
            --glass: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        body { background-color: var(--dark); color: #f8fafc; font-family: 'Rajdhani', sans-serif; }
        .font-hero { font-family: 'Cinzel', serif; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        
        /* बेस डिज़ाइन की ग्लास क्लासेज */
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: var(--gold); }
        
        /* बेस डिज़ाइन के एनिमेटेड ब्लॉब्स */
        .blob { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, rgba(2, 6, 23, 0) 70%); z-index: -1; filter: blur(60px); }
    </style>
</head>
<body class="min-h-full flex flex-col justify-between overflow-x-hidden selection:bg-blue-500/30">

    <!-- बेस डिज़ाइन के ब्लॉब्स -->
    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(2, 6, 23, 0) 70%);"></div>

    <!-- === 1. बेस हेडर (Exact Copy from Base Code) === -->
    <header class="sticky top-0 z-[100] glass-card border-none border-b border-white/5 bg-slate-950/80">
        <div class="max-w-[96%] mx-auto py-4 flex items-center justify-between">
            <div class="text-3xl font-black text-blue-500 font-hero tracking-tighter">
                <a href="/">THE <span class="text-white">QNA</span></a>
            </div>
            
            <nav class="flex items-center gap-4 sm:gap-8 font-tech text-[10px] sm:text-xs tracking-widest text-gray-400">
                <a href="/" class="hover:text-blue-400 transition uppercase">Home</a>
                <a href="/forum" class="hover:text-blue-400 transition uppercase">मंच</a>
            </nav>
        </div>
    </header>

    <!-- === 2. मुख्य लॉगिन एरिया === -->
    <main class="flex-1 flex items-center justify-center p-4 my-8">
        <div class="glass-card rounded-[35px] p-8 max-w-[380px] w-full text-center shadow-2xl transform transition hover:scale-[1.01]">
            
            <!-- सिक्योर आइकॉन -->
            <div class="w-12 h-12 bg-blue-500/10 border border-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-400 text-xl">
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="mb-6">
                <span class="text-blue-400 font-tech text-xs tracking-[0.2em] uppercase block">Secure Access</span>
                <h1 class="text-2xl sm:text-3xl font-black font-hero text-white mt-1">
                    प्रवेश <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-600">करें</span>
                </h1>
                <p class="text-gray-400 text-sm mt-2 px-2">अपना स्कोर ट्रैक करने और 1000+ मॉक टेस्ट अनलॉक करने के लिए लॉगिन करें।</p>
            </div>

            <!-- Google Login Button -->
            <div class="py-4">
                <a href="/auth/google" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-950 font-bold px-4 py-3.5 rounded-2xl shadow-xl transition-all active:scale-[0.98] font-tech text-xs tracking-wider">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_of_24dp.svg" alt="Google Logo" class="w-4 h-4 shrink-0">
                    SIGN IN WITH GOOGLE
                </a>
            </div>

            <!-- सुरक्षा टैग -->
            <div class="text-[9px] font-tech text-gray-500 uppercase tracking-widest border-t border-white/5 pt-4 mt-2">
                🔒 Secured by Google OAuth 2.0
            </div>
        </div>
    </main>

    <!-- === 3. बेस फुटर (Exact Copy from Base Code) === -->
    <footer class="glass-card border-none border-t border-white/5 py-8 mt-10">
        <div class="max-w-[96%] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-xl font-black text-blue-500 font-hero tracking-tighter">THE <span class="text-white">QNA</span></div>
            <div class="text-[10px] font-tech text-gray-600 tracking-widest uppercase">
                &copy; 2026 THE QNA PLATFORM. ALL RIGHTS RESERVED.
            </div>
            <div class="flex gap-4 text-gray-500 text-sm">
                <a href="#" class="hover:text-white transition"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="hover:text-white transition"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="hover:text-white transition"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
