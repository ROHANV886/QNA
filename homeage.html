    <script>
        // 1. सभी 10 सवालों का साफ़ और एकदम परफेक्ट डेटाबेस एरे
        const reelsData = [
            {
                id: "gk_reel_01",
                category: "🏛️ इतिहास (History)",
                tag: "#01",
                colorFrom: "amber-600",
                time: "30s",
                question: "ऋग्वेद में कुल कितने मंडल हैं?",
                options: ["10 मंडल", "8 मंडल", "12 मंडल", "18 मंडल"],
                correctIndex: 0
            },
            {
                id: "gk_reel_02",
                category: "🌍 भूगोल (Geography)",
                tag: "#02",
                colorFrom: "emerald-600",
                time: "30s",
                question: "भारत की सबसे लंबी तटरेखा वाला राज्य कौनसा है?",
                options: ["गुजरात", "महाराष्ट्र", "आंध्र प्रदेश", "तमिलनाडु"],
                correctIndex: 0
            },
            {
                id: "gk_reel_03",
                category: "⚖️ राजव्यवस्था (Polity)",
                tag: "#03",
                colorFrom: "blue-600",
                time: "30s",
                question: "भारतीय संविधान का जनक किसे कहा जाता है?",
                options: ["डॉ. बी.आर. अम्बेडकर", "महात्मा गांधी", "जवाहरलाल नेहरू", "सरदार पटेल"],
                correctIndex: 0
            },
            {
                id: "gk_reel_04",
                category: "🧲 भौतिक विज्ञान (Physics)",
                tag: "#04",
                colorFrom: "purple-600",
                time: "30s",
                question: "'प्रकाश वर्ष' (Light Year) किसका मात्रक है?",
                options: ["दूरी का", "समय का", "प्रकाश की तीव्रता का", "द्रव्यमान का"],
                correctIndex: 0
            },
            {
                id: "gk_reel_05",
                category: "🧪 रसायन विज्ञान (Chemistry)",
                tag: "#05",
                colorFrom: "cyan-600",
                time: "30s",
                question: "आधुनिक आवर्त सारणी में कुल कितने तत्व हैं?",
                options: ["118 तत्व", "108 तत्व", "104 तत्व", "112 तत्व"],
                correctIndex: 0
            },
            {
                id: "gk_reel_06",
                category: "🦠 जीव विज्ञान (Biology)",
                tag: "#06",
                colorFrom: "rose-600",
                time: "30s",
                question: "मानव शरीर की सबसे बड़ी ग्रंथि कौन सी है?",
                options: ["यकृत (Liver)", "अग्न्याशय (Pancreas)", "थायराइड (Thyroid)", "पीयूष (Pituitary)"],
                correctIndex: 0
            },
            {
                id: "gk_reel_07",
                category: "📈 अर्थव्यवस्था (Economy)",
                tag: "#07",
                colorFrom: "teal-600",
                time: "30s",
                question: "भारत में केंद्रीय बैंक कौन सा है?",
                options: ["भारतीय रिजर्व बैंक (RBI)", "भारतीय स्टेट बैंक (SBI)", "पंजाब नेशनल बैंक (PNB)", "सेंट्रल बैंक (CBI)"],
                correctIndex: 0
            },
            {
                id: "gk_reel_08",
                category: "📰 करेंट अफेयर्स (Current Affairs)",
                tag: "#08",
                colorFrom: "orange-600",
                time: "30s",
                question: "नीति आयोग (NITI Aayog) के अध्यक्ष कौन होते हैं?",
                options: ["प्रधानमंत्री", "राष्ट्रपति", "वित्त मंत्री", "उपराष्ट्रपति"],
                correctIndex: 0
            },
            {
                id: "gk_reel_09",
                category: "💻 कंप्यूटर ज्ञान (Computer)",
                tag: "#09",
                colorFrom: "indigo-600",
                time: "30s",
                question: "कंप्यूटर का मस्तिष्क (Brain) किसे कहा जाता है?",
                options: ["CPU", "RAM", "हार्ड डिस्क", "मदरबोर्ड"],
                correctIndex: 0
            },
            {
                id: "gk_reel_10",
                category: "📌 स्टेटिक जीके (Static GK)",
                tag: "#10",
                colorFrom: "pink-600",
                time: "30s",
                question: "'बिहू' किस राज्य का प्रसिद्ध लोक नृत्य है?",
                options: ["अsem", "पंजाब", "राजस्थान", "गुजरात"],
                correctIndex: 0
            }
        ];

        // 2. रील्स को DOM में रेंडर करने का फंक्शन
        function renderReels() {
            const container = document.getElementById("reels-feed");
            if (!container) return;
            container.innerHTML = ""; 

            reelsData.forEach((reel, reelIdx) => {
                const card = document.createElement("div");
                card.id = reel.id;
                card.className = "glass-card rounded-[28px] p-5 h-[460px] flex flex-col justify-between relative overflow-hidden";
                
                let optionsHTML = "";
                reel.options.forEach((opt, optIdx) => {
                    optionsHTML += `
                        <div onclick="checkAnswer(this, ${reelIdx}, ${optIdx}, ${reel.correctIndex})" 
                             class="option-btn bg-white/5 p-3 rounded-xl text-xs font-semibold border border-white/5 cursor-pointer transition-all flex justify-between items-center hover:bg-white/10">
                            <span>${String.fromCharCode(65 + optIdx)}. ${opt}</span>
                            <i class="status-icon hidden fa-solid"></i>
                        </div>
                    `;
                });

                // डायनामिक टेक्स्ट कलर फिक्स
                const textClass = reel.colorFrom === 'blue-600' ? 'blue-400' : reel.colorFrom.replace('600','400');

                card.innerHTML = `
                    <div class="absolute inset-0 bg-gradient-to-b from-${reel.colorFrom}/10 to-transparent pointer-events-none"></div>
                    <div class="flex justify-between items-center z-10">
                        <span class="bg-${reel.colorFrom}/20 text-${textClass} text-[9px] font-bold px-2.5 py-1 rounded-full border border-${reel.colorFrom}/30">${reel.category} ${reel.tag}</span>
                        <span class="text-[10px] text-gray-400">⏱️ ${reel.time}</span>
                    </div>
                    <div class="z-10">
                        <h3 class="text-lg font-bold text-white leading-snug mb-4">${reel.question}</h3>
                        <div class="space-y-2 options-container">
                            ${optionsHTML}
                        </div>
                    </div>
                    <a href="./login.html" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs text-center transition block z-10 hover:bg-blue-500">टेस्ट शुरू करे <i class="fa-solid fa-play ml-1.5"></i></a>
                `;
                
                container.appendChild(card);
            });
        }

        // 3. आंसर चेक करने का लॉजिक फंक्शन
        function checkAnswer(selectedElement, reelIdx, selectedIdx, correctIdx) {
            const container = selectedElement.parentElement;
            
            if (container.classList.contains("answered")) return;
            container.classList.add("answered");

            const allOptions = container.querySelectorAll(".option-btn");

            if (selectedIdx === correctIdx) {
                selectedElement.classList.remove("bg-white/5", "border-white/5");
                selectedElement.classList.add("bg-emerald-500/20", "border-emerald-500", "text-emerald-400");
                const icon = selectedElement.querySelector(".status-icon");
                icon.classList.remove("hidden");
                icon.classList.add("fa-circle-check");
            } else {
                selectedElement.classList.remove("bg-white/5", "border-white/5");
                selectedElement.classList.add("bg-rose-500/20", "border-rose-500", "text-rose-400");
                const icon = selectedElement.querySelector(".status-icon");
                icon.classList.remove("hidden");
                icon.classList.add("fa-circle-xmark");

                const correctElement = allOptions[correctIdx];
                correctElement.classList.remove("bg-white/5", "border-white/5");
                correctElement.classList.add("bg-emerald-500/20", "border-emerald-500", "text-emerald-400");
            }

            allOptions.forEach((opt, idx) => {
                if (idx !== selectedIdx && idx !== correctIdx) {
                    opt.classList.add("opacity-30");
                }
                opt.style.pointerEvents = "none"; 
            });
        }

        // पेज लोड होते ही रील्स को चालू करें
        document.addEventListener("DOMContentLoaded", renderReels);
    </script>
</body>
