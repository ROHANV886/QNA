<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edit Profile</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:"Plus Jakarta Sans",sans-serif;background:#0B0F19;color:#fff}.card{background:#131B2C;border:1px solid rgba(255,255,255,.08)}input,select,textarea{background:#0f172a;color:#fff}</style></head><body class="p-4"><div class="max-w-xl mx-auto"><h1 class="text-3xl font-black mb-6">Edit Profile</h1><form id="profileForm" class="space-y-5"><div class="card rounded-2xl p-5"><h2 class="font-bold mb-4">Personal Information</h2><div class="grid gap-3"><input id="name" class="p-3 rounded-xl" placeholder="Full Name"><input id="username" class="p-3 rounded-xl" placeholder="Username"><input id="email" type="email" class="p-3 rounded-xl" placeholder="Email"><input id="phone" class="p-3 rounded-xl" placeholder="Mobile"><input id="dob" type="date" class="p-3 rounded-xl"><select id="gender" class="p-3 rounded-xl"><option>Male</option><option>Female</option><option>Other</option></select><input id="blood" class="p-3 rounded-xl" placeholder="Blood Group"><input id="language" class="p-3 rounded-xl" placeholder="Language"></div></div><div class="card rounded-2xl p-5"><h2 class="font-bold mb-4">Address</h2><div class="grid gap-3"><input id="country" class="p-3 rounded-xl"><input id="state" class="p-3 rounded-xl"><input id="city" class="p-3 rounded-xl"><input id="pincode" class="p-3 rounded-xl"><textarea id="address" class="p-3 rounded-xl"></textarea></div></div><div class="card rounded-2xl p-5"><h2 class="font-bold mb-4">Education</h2><div class="grid gap-3"><input id="qualification" class="p-3 rounded-xl"><input id="college" class="p-3 rounded-xl"><input id="course" class="p-3 rounded-xl"><input id="year" class="p-3 rounded-xl"><input id="exam" class="p-3 rounded-xl" placeholder="Target Exam"><input id="hours" class="p-3 rounded-xl" placeholder="Study Hours"></div></div><div class="flex gap-3"><button class="flex-1 bg-blue-600 rounded-xl py-3 font-bold">Save Changes</button><a href="profile.html" class="flex-1 text-center bg-gray-700 rounded-xl py-3 font-bold">Cancel</a></div></form></div><script>let u=JSON.parse(localStorage.getItem("user"))||{};const ids=["name","username","email","phone","dob","gender","blood","language","country","state","city","pincode","address","qualification","college","course","year","exam","hours"];ids.forEach(id=>{let e=document.getElementById(id);if(e&&u[id])e.value=u[id]});document.getElementById("profileForm").onsubmit=e=>{e.preventDefault();ids.forEach(id=>{let el=document.getElementById(id);if(el)u[id]=el.value});if(!u.photo)u.photo="https://api.dicebear.com/7.x/avataaars/svg?seed="+encodeURIComponent(u.name||"User");localStorage.setItem("user",JSON.stringify(u));let users=JSON.parse(localStorage.getItem("users"))||[];let i=users.findIndex(x=>x.email===u.email);if(i>=0)users[i]=u;else users.push(u);localStorage.setItem("users",JSON.stringify(users));alert("Profile Updated");location.href="profile.html";};</script></body></html>
