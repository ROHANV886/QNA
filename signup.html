<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The QNA - Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0B0F19;}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
input{outline:none}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 text-white">

<div class="w-full max-w-md glass rounded-3xl p-8">
<div class="text-center">
<div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center mx-auto text-3xl font-black">Q</div>
<h1 class="text-3xl font-extrabold mt-5">The QNA</h1>
<p class="text-gray-400 mt-2">Create your account</p>
</div>

<div class="space-y-4 mt-8">
<input id="name" class="w-full bg-[#111827] rounded-xl px-4 py-3" placeholder="Full Name">
<input id="email" type="email" class="w-full bg-[#111827] rounded-xl px-4 py-3" placeholder="Email">
<input id="phone" class="w-full bg-[#111827] rounded-xl px-4 py-3" maxlength="10" placeholder="Mobile Number">
</div>
<button id="continueBtn"
class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3 font-bold transition hover:scale-[1.02]">
Continue
</button>
<div class="flex items-center gap-3 my-6">
<div class="h-px flex-1 bg-white/10"></div>
<span class="text-xs text-gray-400">OR</span>
<div class="h-px flex-1 bg-white/10"></div>
</div>

<button id="googleBtn" class="w-full bg-white text-black rounded-xl py-3 font-bold transition hover:scale-[1.02]">
Continue with Google
</button>


</div>

<script>
if(localStorage.getItem("user")){
    location.href="profile.html";
}

document.getElementById("googleBtn").onclick=function(){

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const phone=document.getElementById("phone").value.trim();

if(!name||!email||!phone){
alert("Please fill all fields.");
return;
}

const user={
name:name,
email:email,
phone:phone,
photo:"https://api.dicebear.com/7.x/avataaars/svg?seed="+encodeURIComponent(name),
rank:"#142",
accuracy:"86%",
tests:"24"
};

localStorage.setItem("user",JSON.stringify(user));

this.innerHTML="Signing In...";
this.disabled=true;

setTimeout(()=>{
location.href="profile.html";
},1000);

};
</script>

</body>
</html>
